name: Release And Publish AUR

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  PACKAGE_NAME: rudo-bin

jobs:
  build-release:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      asset_name: ${{ steps.bundle.outputs.asset_name }}

    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git cargo rust pkgconf gtk4 gtk4-layer-shell curl

      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: meta
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME:-}"
          version="${ref_name#v}"
          if [[ -z "$version" || "$version" == "$ref_name" ]]; then
            version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: cargo build --release --locked

      - name: Bundle release archive
        id: bundle
        shell: bash
        run: |
          version='${{ steps.meta.outputs.version }}'
          mkdir -p dist
          asset_name="rudo-${version}-x86_64-linux.tar.gz"
          tar -C target/release -czf "dist/${asset_name}" rudo
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-archive
          path: dist/${{ steps.bundle.outputs.asset_name }}

  publish-github-release:
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Download built archive
        uses: actions/download-artifact@v4
        with:
          name: release-archive
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ needs.build-release.outputs.asset_name }}
          generate_release_notes: true

  aur-publish:
    runs-on: ubuntu-latest
    needs: build-release
    container:
      image: archlinux:latest

    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      PKGVER: ${{ needs.build-release.outputs.version }}

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git curl openssh

      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate PKGBUILD dynamically
        run: |
          source_url="https://github.com/${REPO_OWNER}/${REPO_NAME}/archive/refs/tags/v${PKGVER}.tar.gz"
          sha256="$(curl -L "$source_url" | sha256sum | awk '{print $1}')"

          bash ./scripts/render-aur-package.sh aur-dist \
            "$PACKAGE_NAME" \
            "$PKGVER" \
            "$REPO_OWNER" \
            "$REPO_NAME" \
            "$sha256"

      - name: Generate .SRCINFO (correct environment)
        run: |
          cd aur-dist
          makepkg --printsrcinfo > .SRCINFO

      - name: Publish AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: rudo-bin
          pkgbuild: ./aur-dist/PKGBUILD
          assets: |
            aur-dist/.SRCINFO
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update rudo-bin to ${{ needs.build-release.outputs.version }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
