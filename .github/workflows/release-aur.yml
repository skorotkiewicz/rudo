name: Release And Publish AUR

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  PACKAGE_NAME: rudo-bin

jobs:
  build-release:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      asset_name: ${{ steps.bundle.outputs.asset_name }}

    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git cargo rust pkgconf gtk4 gtk4-layer-shell curl

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify source
        run: |
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets --all-features -- -D warnings
          cargo test --locked --all-targets

      - name: Derive version
        id: meta
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME:-}"
          version="${ref_name#v}"
          if [[ -z "$version" || "$version" == "$ref_name" ]]; then
            version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          fi
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          if [[ "$version" != "$cargo_version" ]]; then
            echo "tag version $version does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: cargo build --release --locked

      - name: Bundle release archive
        id: bundle
        shell: bash
        run: |
          version='${{ steps.meta.outputs.version }}'
          mkdir -p dist/bundle
          install -Dm755 target/release/rudo dist/bundle/rudo
          install -Dm644 README.md dist/bundle/README.md
          install -Dm644 LICENSE dist/bundle/LICENSE
          install -Dm644 docs/rudo.service dist/bundle/rudo.service
          install -Dm644 docs/rudo.service dist/rudo.service
          asset_name="rudo-${version}-x86_64-linux.tar.gz"
          tar -C dist/bundle -czf "dist/${asset_name}" rudo README.md LICENSE rudo.service
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-archive
          path: |
            dist/${{ steps.bundle.outputs.asset_name }}
            dist/rudo.service

  publish-github-release:
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Download built archive
        uses: actions/download-artifact@v4
        with:
          name: release-archive
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ needs.build-release.outputs.asset_name }}
            dist/rudo.service
          generate_release_notes: true

  aur-publish:
    runs-on: ubuntu-latest
    needs: [build-release, publish-github-release]
    container:
      image: archlinux:latest

    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      PKGVER: ${{ needs.build-release.outputs.version }}

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git curl openssh sudo

      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate PKGBUILD dynamically
        run: |
          set -euo pipefail
          binary_url="https://github.com/${REPO_OWNER}/${REPO_NAME}/releases/download/v${PKGVER}/rudo-${PKGVER}-x86_64-linux.tar.gz"
          curl --fail --location --silent --show-error \
            --retry 5 --retry-delay 2 --retry-all-errors "$binary_url" \
            --output release.tar.gz
          sha256="$(sha256sum release.tar.gz | awk '{print $1}')"

          bash ./scripts/render-aur-package.sh aur-dist \
            "$PACKAGE_NAME" \
            "$PKGVER" \
            "$REPO_OWNER" \
            "$REPO_NAME" \
            "$sha256"

      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Generate .SRCINFO (non-root)
        run: |
          chown -R builder:builder aur-dist
          sudo -u builder bash -lc "cd aur-dist && makepkg --printsrcinfo > .SRCINFO"

      - name: Publish AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.2
        with:
          pkgname: rudo-bin
          pkgbuild: ./aur-dist/PKGBUILD
          assets: |
            aur-dist/.SRCINFO
            aur-dist/rudo-bin.install
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update rudo-bin to ${{ needs.build-release.outputs.version }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
